name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, pdo_sqlite, sqlite3
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Prepare app key
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Install Node dependencies
        run: npm ci

      - name: Run code style check (Pint on changed PHP files)
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="origin/${{ github.base_ref }}"
            git fetch origin "${{ github.base_ref }}" --depth=1
            DIFF_RANGE="$BASE_REF...HEAD"
          else
            if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
              DIFF_RANGE="HEAD~1...HEAD"
            else
              DIFF_RANGE="HEAD"
            fi
          fi

          CHANGED_PHP_FILES=$(git diff --name-only $DIFF_RANGE -- '*.php' | tr '\n' ' ')

          if [ -z "$CHANGED_PHP_FILES" ]; then
            echo "No changed PHP files detected for Pint check."
            exit 0
          fi

          echo "Running Pint on changed files: $CHANGED_PHP_FILES"
          vendor/bin/pint --test $CHANGED_PHP_FILES

      - name: Run migration dry-run (pretend)
        run: php artisan migrate --pretend
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'

      - name: Build frontend assets
        run: npm run build

      - name: Run database migrations (sqlite memory)
        run: php artisan migrate --force
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'

      - name: Run tests
        run: php artisan test --env=testing
